name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui/landing/**'
      - 'docs/images/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy landing page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r ui/landing/. _site/
          # Make screenshots reachable from the landing page if it links to them.
          mkdir -p _site/docs/images
          cp -r docs/images/. _site/docs/images/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
