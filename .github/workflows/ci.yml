name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,dev]'

      - name: Lint
        run: ruff check aegis tests

      - name: Type-check
        run: mypy aegis || true   # advisory until typing tightens

      - name: Run unit tests
        run: pytest -q --cov=aegis --cov-report=term --cov-report=xml

      - name: Run adversarial corpus benchmark
        run: pytest -q -m adversarial tests/adversarial

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  ts-sdk:
    name: TypeScript SDK build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk-ts/package.json
      - run: npm install
      - run: npm run lint
      - run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t aegis-guard:ci .
      - name: Smoke test
        run: |
          docker run -d --name aegis -p 8080:8080 \
            -e AEGIS_MASTER_KEY=00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff \
            aegis-guard:ci
          sleep 5
          curl --fail http://localhost:8080/aegis/health
          docker logs aegis
          docker rm -f aegis
