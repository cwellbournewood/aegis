name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,dev]'

      - name: Lint
        run: ruff check aegis tests

      - name: Type-check
        run: mypy aegis || true   # advisory until typing tightens

      - name: Run unit tests
        run: pytest -q --cov=aegis --cov-report=term --cov-report=xml

      - name: Run adversarial corpus benchmark
        run: pytest -q -m adversarial tests/adversarial

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  ts-sdk:
    name: TypeScript SDK build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk-ts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk-ts/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t aegis-guard:ci .
      - name: Smoke test
        run: |
          docker run -d --name aegis -p 8080:8080 \
            -e AEGIS_MASTER_KEY=00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff \
            aegis-guard:ci
          sleep 5
          curl --fail http://localhost:8080/aegis/health
          docker logs aegis
          docker rm -f aegis

  perf:
    name: Performance benchmarks (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[test,dev]'
      - name: Run aegis bench (adversarial corpus)
        run: |
          aegis bench --mode balanced | tee /tmp/bench-balanced.txt
          aegis bench --mode strict | tee /tmp/bench-strict.txt
      - name: Run aegis bench-perf (latency / throughput)
        run: aegis bench-perf --iterations 500 | tee /tmp/bench-perf.txt
      - uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: /tmp/bench-*.txt

  helm:
    name: Helm chart lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: helm lint
        run: helm lint deploy/helm/aegis
      - name: helm template (default values)
        run: helm template aegis-test deploy/helm/aegis > /tmp/rendered-default.yaml
      - name: helm template (HPA + ServiceMonitor enabled)
        run: |
          helm template aegis-test deploy/helm/aegis \
            --set autoscaling.enabled=true \
            --set serviceMonitor.enabled=true \
            --set ingress.enabled=true \
            > /tmp/rendered-full.yaml
      - name: kubeval the rendered manifests
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas /tmp/rendered-default.yaml
          ./kubeconform -strict -ignore-missing-schemas /tmp/rendered-full.yaml
